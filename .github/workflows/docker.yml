name: Build & Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"        # e.g. v1.2.3
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. Szzrain/SealSignMiddleware → ghcr.io/szzrain/sealsignmiddleware

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    # Required to write packages and read repo contents
    permissions:
      contents: read
      packages: write

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Set up QEMU for multi-platform builds
      # ------------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ------------------------------------------------------------------
      # 3. Set up Docker Buildx
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------------
      # 4. Log in to GitHub Container Registry
      #    (skipped on pull-request events to avoid secret exposure)
      # ------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 5. Extract metadata (tags & labels) for Docker
      #    • branch push  → :latest  +  :<sha-short>
      #    • semver tag   → :v1.2.3  +  :1.2  +  :1  +  :latest
      # ------------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ------------------------------------------------------------------
      # 6. Build (and push when not a PR)
      # ------------------------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache via GitHub Actions cache backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

